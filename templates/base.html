{% load static %}
<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Restaurant Booking{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'favicon/pizza.png' %}" />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <h1 class="logo">Little Bistro</h1>
        <nav>
          <a href="{% url 'home' %}">Home</a>
          <a href="{% url 'booking_create' %}">Book a table</a>
          <a href="{% url 'booking_list' %}">View bookings</a>
          <a href="{% url 'menu' %}">Menu</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <div class="container">
        <p>Simple Django restaurant booking project.</p>
      </div>
    </footer>
  </body>
</html>
